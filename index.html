<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Monedas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <h1 class="p-3">Conversor de monedas</h1>
    <div class="container">
        <h4>Pesos CLP</h4>
        <input type="number" id="monto" placeholder="Ingrese el monto en CLP" style="border-radius: 5px; border: none; width: 200px; text-align: center;">
        <h6>Moneda a convertir</h6>
        <select name="" id="monedas" style="border-radius: 5px; border: none; color: rgb(105, 105, 105); width: 200px;">
            <option value="" disabled selected style="font-size: 12px;">Seleccione moneda</option>
            <option value="dolar">Dolar</option>
            <option value="euro">Euro</option>
        </select>
        <button id="convertButton" style="border-radius: 5px; border: none; background-color: rgb(8, 156, 156); color: white; width: 200px;">Buscar</button>
        <p>Resultado:</p>
        <p id="resultado"></p>
    </div>
    <div class="grafica" style="width:500px; height:300px;">
        <canvas id="myChart"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./assets/js/script.js"></script>

</body>

</html>
